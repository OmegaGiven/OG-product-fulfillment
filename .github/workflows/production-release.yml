name: Production Release

# Trigger: push a version tag
#   git tag v1.2.3 && git push origin v1.2.3
# Or use the npm release helpers from the repo root:
#   npm run release:patch   (1.0.0 → 1.0.1)
#   npm run release:minor   (1.0.0 → 1.1.0)
#   npm run release:major   (1.0.0 → 2.0.0)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build, Submit & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Set version in app.json
        working-directory: apps/mobile
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "Version set to $VERSION"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # Sync submit credentials to EAS secrets so --auto-submit can access
      # them on EAS servers (GitHub Actions env vars don't reach EAS infra).
      # --force overwrites on every release so rotated keys stay current.
      - name: Sync credentials to EAS secrets
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          _APPLE_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          _APPLE_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          _APPLE_KEY: ${{ secrets.APPLE_API_KEY }}
          _GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          eas secret:create --scope project --name EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ID    --value "$_APPLE_KEY_ID"    --type string --force --non-interactive
          eas secret:create --scope project --name EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ISSUER_ID --value "$_APPLE_KEY_ISSUER" --type string --force --non-interactive
          eas secret:create --scope project --name EXPO_APPLE_APP_STORE_CONNECT_API_KEY        --value "$_APPLE_KEY"       --type string --force --non-interactive
          eas secret:create --scope project --name GOOGLE_SERVICE_ACCOUNT_KEY                 --value "$_GOOGLE_SA_KEY"   --type string --force --non-interactive

      # Queues builds + auto-submit on EAS servers then exits immediately.
      # iOS → TestFlight (internal). Android → Play Internal Track (draft).
      # OTA updates are NOT pushed here — users get new code only via store
      # review, keeping rollout under your control.
      - name: Build + Auto-Submit
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform all \
            --profile production \
            --auto-submit \
            --non-interactive \
            --no-wait \
            --message "Release ${{ steps.version.outputs.TAG }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.TAG }}';
            const changelog = `${{ steps.changelog.outputs.CHANGELOG }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## What's Changed\n\n${changelog}\n\n---\n\n> EAS builds queued — iOS → TestFlight, Android → Play Internal Track.\n> Monitor at [expo.dev](https://expo.dev). Builds are NOT auto-promoted to production; promote manually from the store dashboards when ready.`,
              draft: false,
              prerelease: false
            });
