name: Production Release

# Trigger: push a git tag like v1.2.3
# Example: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build, Submit & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      # ── Version extraction ─────────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v': v1.2.3 → 1.2.3
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      # ── Node + deps ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      # ── Bump version in app.json ───────────────────────────────────────────
      # EAS autoIncrement handles buildNumber/versionCode; we set the human version.
      - name: Set version in app.json
        working-directory: apps/mobile
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "app.json version set to $VERSION"
          cat app.json | grep '"version"'

      # ── EAS Build ─────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build Android (AAB) + iOS + Auto-Submit to stores
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Android submit — service account JSON stored as a secret
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          # iOS submit — App Store Connect API key
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive \
            --no-wait \
            --message "Release ${{ steps.version.outputs.TAG }}"

          # --no-wait queues builds on EAS servers and exits immediately.
          # --auto-submit is omitted here; submit is triggered separately below
          # once both builds are queued, to avoid blocking the runner.
          # To wait and auto-submit in one command use --auto-submit instead of --no-wait.

      # ── Generate changelog ─────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          # Escape for GitHub Actions multiline output
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.VERSION }}';
            const tag = '${{ steps.version.outputs.TAG }}';
            const changelog = `${{ steps.changelog.outputs.CHANGELOG }}`;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## What's Changed\n\n${changelog}\n\n---\n\n> EAS builds are queued and will be submitted to App Store (TestFlight) and Google Play (Internal Track) automatically. Check [Expo dashboard](https://expo.dev) for build status.`,
              draft: false,
              prerelease: false
            });
