<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0f172a"/>

  <!-- Box: left side, bottom, right side (no top edge) -->
  <polyline
    points="248,500 248,840 776,840 776,500"
    fill="none"
    stroke="#e2e8f0"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Left flap: 45° outward + upward from top of left side -->
  <line
    x1="248" y1="500"
    x2="82"  y2="334"
    stroke="#e2e8f0"
    stroke-width="58"
    stroke-linecap="round"/>

  <!-- Right flap: 45° outward + upward from top of right side -->
  <line
    x1="776" y1="500"
    x2="942" y2="334"
    stroke="#e2e8f0"
    stroke-width="58"
    stroke-linecap="round"/>

  <!-- Checkmark: rises from inside the box and out through the top opening -->
  <!-- Left leg of check descends into box, right leg sweeps up and out -->
  <polyline
    points="350,620 468,740 700,360"
    fill="none"
    stroke="#22c55e"
    stroke-width="68"
    stroke-linecap="round"
    stroke-linejoin="round"/>

</svg>
